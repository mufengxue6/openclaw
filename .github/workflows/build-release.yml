name: Build Release

on:
  push:
    branches:
      - beta
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        type: string
        default: '2026.3.8'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
      
      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat package.json | grep '"version"' | head -1 | sed 's/.*: "\(.*\)",/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: |
          pnpm install --no-frozen-lockfile
      
      - name: Build application
        run: |
          pnpm run build
      
      - name: Package application (full)
        run: |
          # Package everything except dev files
          zip -r OpenClaw-${{ steps.get_version.outputs.version }}.zip \
            package.json openclaw.mjs README.md LICENSE CHANGELOG.md \
            dist/ node_modules/ assets/ docs/ extensions/ skills/ \
            -x "*.map" -x "*.ts" -x "node_modules/.cache/*" \
            -x "node_modules/.pnpm/*" 2>/dev/null || \
          # Fallback: package dist only
          (cd dist && zip -r ../OpenClaw-${{ steps.get_version.outputs.version }}.zip .)
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-${{ steps.get_version.outputs.version }}
          path: OpenClaw-*.zip
          retention-days: 30
      
      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenClaw-*.zip
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            Beta release ${{ steps.get_version.outputs.version }}
            
            ## Fixes
            - Bumped @mariozechner/pi-* packages to 0.55.4
            - Fixed syntax error in anthropic.js
            
            ## Install
            ```bash
            # Download and extract
            curl -L -o openclaw.zip https://github.com/snowzlm/openclaw/releases/download/${{ steps.get_version.outputs.tag_name }}/OpenClaw-${{ steps.get_version.outputs.version }}.zip
            unzip openclaw.zip -d /usr/lib/node_modules/openclaw
            ln -sf /usr/lib/node_modules/openclaw/openclaw.mjs /usr/bin/openclaw
            ```
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to npm
        run: |
          npm config set //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          npm publish --access public --tag beta
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true
